<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>securify — data security</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind={theme:{extend:{fontFamily:{sans:["Readex Pro","system-ui","-apple-system","sans-serif"]}}}};
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
html,body,#root{height:100%;margin:0}
body{font-family:'Readex Pro',system-ui,-apple-system,sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.hero-title{letter-spacing:-0.04em;line-height:0.95}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const VIDEO_URL="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_063509_7d167302-4fd4-480b-8260-18ab572333d4.mp4";
const LOGO_PATH="M 128 192 L 128 256 L 64.5 256 L 32 223 L 0 192 L 0 128 L 64 128 Z M 256 192 L 256 256 L 192.5 256 L 160 223 L 128 192 L 128 128 L 192 128 Z M 128 64 L 128 128 L 64.5 128 L 32 95 L 0 64 L 0 0 L 64 0 Z M 256 64 L 256 128 L 192.5 128 L 160 95 L 128 64 L 128 0 L 192 0 Z";

function Logo(){
  return (
    <svg viewBox="0 0 256 256" className="h-5 w-5" aria-hidden="true">
      <path d={LOGO_PATH} fill="#ffffff"></path>
    </svg>
  );
}

function Navbar(){
  const links=["platform","solutions","company","support"];
  return (
    <div className="absolute z-20 px-6 md:px-10 pt-6 top-0 left-0 right-0">
      <nav className="flex items-center justify-between gap-4">
        <a href="#" className="flex items-center gap-2 bg-neutral-900/90 backdrop-blur rounded-full pl-4 pr-6 py-3">
          <Logo/>
          <span className="text-white text-sm font-normal tracking-tight">securify</span>
        </a>

        <div className="hidden md:flex items-center gap-1 bg-neutral-900/90 backdrop-blur rounded-full px-3 py-2">
          {links.map(link=>(
            <a key={link} href="#" className="text-neutral-300 hover:text-white transition-colors text-sm px-5 py-2 rounded-full">
              {link}
            </a>
          ))}
        </div>

        <a href="#" className="bg-white text-black text-sm font-normal rounded-full px-6 py-3 hover:bg-neutral-200 transition-colors">
          get started
        </a>
      </nav>
    </div>
  );
}

function StatTopRight(){
  return (
    <div className="absolute right-6 md:right-24 top-[14%]">
      <div className="flex items-center gap-3 justify-end">
        <div className="hidden md:block h-px w-24 bg-white/40 rotate-[20deg]"></div>
        <div className="text-4xl md:text-5xl font-medium tracking-tight">+65k</div>
      </div>
      <div className="text-xs md:text-sm text-white/70 mt-1 text-right">startups use</div>
    </div>
  );
}

function StatBottomLeft(){
  return (
    <div className="absolute left-6 md:left-20 bottom-20 md:bottom-24">
      <div className="flex items-center gap-3">
        <div className="text-4xl md:text-5xl font-medium tracking-tight">+1.5b</div>
        <div className="hidden md:block h-px w-24 bg-white/40 rotate-[-20deg]"></div>
      </div>
      <div className="text-xs md:text-sm text-white/70 mt-1">gb data was protected</div>
    </div>
  );
}

function StatBottomRight(){
  return (
    <div className="absolute right-6 md:right-20 bottom-16 md:bottom-20">
      <div className="flex items-center gap-3 justify-end">
        <div className="hidden md:block h-px w-24 bg-white/40 rotate-[-20deg]"></div>
        <div className="text-4xl md:text-5xl font-medium tracking-tight">+300k</div>
      </div>
      <div className="text-xs md:text-sm text-white/70 mt-1 text-right">downloads</div>
    </div>
  );
}

function Hero(){
  return (
    <section className="relative h-screen w-full overflow-hidden bg-black">
      <video
        className="absolute inset-0 w-full h-full object-cover"
        src={VIDEO_URL}
        autoPlay
        loop
        muted
        playsInline
        preload="auto"
      />

      <Navbar/>

      <div className="relative h-full w-full">
        <h1 className="hero-title absolute text-white font-medium text-[14vw] md:text-[13vw] left-4 md:left-10 top-[18%]">
          protect
        </h1>

        <h1 className="hero-title absolute text-white font-medium text-[14vw] md:text-[13vw] right-4 md:right-10 top-[38%]">
          your
        </h1>

        <h1 className="hero-title absolute text-white font-medium text-[14vw] md:text-[13vw] left-[18%] md:left-[28%] top-[58%]">
          data
        </h1>

        <p className="absolute left-6 md:left-10 top-[46%] max-w-[240px] text-[15px] leading-snug text-white/90">
          we can guarding your data with utmost care, empowering you with privacy everywhere
        </p>

        <StatTopRight/>

        <div className="pointer-events-none absolute bottom-0 left-0 right-0 h-48 bg-gradient-to-b from-transparent to-black"></div>

        <StatBottomLeft/>
        <StatBottomRight/>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Hero/>);
</script>
</body>
</html>
